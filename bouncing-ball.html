<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teddy Bear Choice</title>
  <style>
    :root {
      --scene-width: 900px;
      --scene-height: 680px;
      --button-width: 130px;
      --button-height: 55px;
      --yes-color: #82befb;
      --no-color: #ff8c91;
      --text-color: #372d46;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fff8ee, #ece2f7);
      color: var(--text-color);
    }

    .scene {
      position: relative;
      width: var(--scene-width);
      height: var(--scene-height);
      background: linear-gradient(180deg, #fff0e6 0%, #ebe0f5 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .cloud {
      position: absolute;
      width: 140px;
      height: 50px;
      background: rgba(255,255,255,0.7);
      border-radius: 999px;
      filter: blur(0.8px);
      opacity: 0.8;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
    }

    .cloud::before {
      width: 55px;
      height: 55px;
      left: 15px;
      top: -20px;
    }

    .cloud::after {
      width: 70px;
      height: 70px;
      right: 10px;
      top: -30px;
    }

    .cloud1 { top: 45px; left: 60px; }
    .cloud2 { top: 110px; right: 120px; transform: scale(0.9); }
    .cloud3 { top: 35px; left: 300px; transform: scale(0.7); }

    .heart {
      position: absolute;
      width: 14px;
      height: 14px;
      background: rgba(255, 135, 170, 0.55);
      transform: rotate(45deg);
      opacity: 0.85;
      border-radius: 2px;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before { left: -7px; top: 0; }
    .heart::after { left: 0; top: -7px; }

    .heart1 { top: 160px; left: 100px; transform: rotate(45deg) scale(1.2); }
    .heart2 { top: 80px; left: 180px; transform: rotate(45deg) scale(0.9); }
    .heart3 { top: 150px; left: 260px; transform: rotate(45deg) scale(1); }
    .heart4 { top: 110px; left: 360px; transform: rotate(45deg) scale(1.3); }
    .heart5 { top: 190px; left: 430px; transform: rotate(45deg) scale(1); }
    .heart6 { top: 90px; left: 520px; transform: rotate(45deg) scale(0.9); }
    .heart7 { top: 170px; left: 620px; transform: rotate(45deg) scale(1.2); }
    .heart8 { top: 130px; left: 720px; transform: rotate(45deg) scale(1); }
    .heart9 { top: 190px; left: 800px; transform: rotate(45deg) scale(0.9); }

    .message {
      position: absolute;
      top: 70px;
      left: 60px;
      font-size: 30px;
      font-weight: 700;
      color: var(--text-color);
      letter-spacing: 0.2px;
    }

    .bear {
      position: absolute;
      left: 50%;
      top: 220px;
      width: 220px;
      height: 220px;
      transform: translateX(-50%);
      animation: bob 1.2s ease-in-out infinite;
      transition: transform 0.18s ease;
    }

    .ear,
    .head,
    .muzzle,
    .eye,
    .pupil,
    .nose,
    .mouth,
    .cheek,
    .tear {
      position: absolute;
    }

    .ear {
      width: 80px;
      height: 80px;
      background: #cd9664;
      border-radius: 50%;
      top: 0;
    }

    .ear.left { left: 8px; }
    .ear.right { right: 8px; }

    .head {
      width: 220px;
      height: 220px;
      background: #cd9664;
      border-radius: 50%;
      top: 20px;
      left: 0;
      box-shadow: inset 0 0 0 4px rgba(0,0,0,0.02);
    }

    .muzzle {
      width: 105px;
      height: 110px;
      background: #f0d2a5;
      border-radius: 50%;
      left: 58px;
      top: 80px;
    }

    .eye {
      width: 40px;
      height: 55px;
      background: #fff;
      border-radius: 50%;
      top: 70px;
    }

    .eye.left { left: 55px; }
    .eye.right { right: 55px; }

    .pupil {
      width: 18px;
      height: 24px;
      background: #412814;
      border-radius: 50%;
      top: 86px;
    }

    .pupil.left { left: 67px; }
    .pupil.right { right: 67px; }

    .nose {
      width: 24px;
      height: 16px;
      background: #e3918c;
      border-radius: 999px;
      left: 98px;
      top: 118px;
    }

    .mouth {
      width: 40px;
      height: 30px;
      border-bottom: 5px solid #503514;
      border-radius: 0 0 999px 999px;
      left: 90px;
      top: 142px;
    }

    .cheek {
      width: 16px;
      height: 10px;
      background: #e3918c;
      border-radius: 999px;
      top: 120px;
    }

    .cheek.left { left: 42px; }
    .cheek.right { right: 42px; }

    .tear {
      width: 12px;
      height: 28px;
      background: rgba(140,190,255,0.9);
      border-radius: 50% 50% 60% 60%;
      opacity: 0;
      transform: translateY(0);
      transition: opacity 0.2s ease;
    }

    .tear.left { left: 78px; top: 86px; }
    .tear.right { right: 78px; top: 86px; }

    .tear.show { opacity: 1; }

    .sound-text {
      position: absolute;
      left: 280px;
      top: 500px;
      font-size: 20px;
      font-weight: 700;
      color: rgba(95,55,110,0.9);
      min-height: 28px;
    }

    .hint {
      position: absolute;
      left: 320px;
      top: 530px;
      font-size: 18px;
      font-style: italic;
      color: rgba(100,60,100,0.7);
      min-height: 24px;
    }

    .btn {
      position: absolute;
      width: var(--button-width);
      height: var(--button-height);
      border: none;
      border-radius: 999px;
      font-size: 22px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.7; cursor: default; }

    .btn-yes {
      left: 200px;
      top: 520px;
      background: var(--yes-color);
    }

    .btn-no {
      left: 560px;
      top: 520px;
      background: var(--no-color);
    }

    .btn.jump {
      animation: jump-button 0.4s ease-in-out;
    }

    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-10px); }
    }

    @keyframes jump-button {
      0% { transform: translateY(0); }
      25% { transform: translateY(-8px) translateX(6px); }
      50% { transform: translateY(0) translateX(-6px); }
      75% { transform: translateY(-4px) translateX(6px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="heart heart1"></div>
    <div class="heart heart2"></div>
    <div class="heart heart3"></div>
    <div class="heart heart4"></div>
    <div class="heart heart5"></div>
    <div class="heart heart6"></div>
    <div class="heart heart7"></div>
    <div class="heart heart8"></div>
    <div class="heart heart9"></div>

    <div class="message" id="message">First give options: Yes or No.</div>

    <div class="bear" id="bear">
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="head"></div>
      <div class="muzzle"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="pupil left"></div>
      <div class="pupil right"></div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
      <div class="tear left" id="tearLeft"></div>
      <div class="tear right" id="tearRight"></div>
    </div>

    <div class="sound-text" id="soundText"></div>
    <div class="hint" id="hint"></div>

    <button class="btn btn-yes" id="yesBtn">Yes</button>
    <button class="btn btn-no" id="noBtn">No</button>
  </div>

  <script>
    const messageEl = document.getElementById('message');
    const soundTextEl = document.getElementById('soundText');
    const hintEl = document.getElementById('hint');
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const tearLeft = document.getElementById('tearLeft');
    const tearRight = document.getElementById('tearRight');
    const bear = document.getElementById('bear');

    let stage = 0;
    let tick = 0;
    let crying = false;
    let success = false;
    let noCount = 0;

    function updateTears() {
      if (!crying) {
        tearLeft.classList.remove('show');
        tearRight.classList.remove('show');
        return;
      }

      const offset = (tick / 6) % 32;
      tearLeft.style.transform = `translateY(${offset}px)`;
      tearRight.style.transform = `translateY(${offset}px)`;
      tearLeft.classList.add('show');
      tearRight.classList.add('show');
    }

    function updateHint() {
      if (!success && stage >= 2) {
        hintEl.textContent = 'The No button is jumping!';
      } else {
        hintEl.textContent = '';
      }
    }

    function moveNoButton() {
      const margin = 20;
      const buttonWidth = noBtn.offsetWidth;
      const buttonHeight = noBtn.offsetHeight;
      const maxX = 900 - buttonWidth - margin;
      const maxY = 680 - buttonHeight - margin;
      let x = margin + Math.random() * Math.max(1, maxX - margin + 1);
      let y = margin + 220 + Math.random() * Math.max(1, maxY - 220 - margin + 1);
      let attempts = 0;
      const currentX = parseInt(noBtn.style.left || '560px');
      const currentY = parseInt(noBtn.style.top || '520px');

      while (attempts < 7 && Math.hypot(x - currentX, y - currentY) < 240) {
        x = margin + Math.random() * Math.max(1, maxX - margin + 1);
        y = margin + 220 + Math.random() * Math.max(1, maxY - 220 - margin + 1);
        attempts += 1;
      }

      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
    }

    function setMessage(msg) {
      messageEl.textContent = msg;
    }

    function tickLoop() {
      tick += 1;
      updateTears();
      bear.style.transform = `translateX(-50%) translateY(${Math.sin(tick * 0.08) * 8}px)`;
      requestAnimationFrame(tickLoop);
    }

    function handleYes() {
      if (success) return;
      success = true;
      crying = false;
      setMessage('Yes! Thank you, I love you!');
      soundTextEl.textContent = 'Yay! 💖';
      updateHint();
      yesBtn.disabled = true;
      noBtn.disabled = true;
      noBtn.classList.remove('jump');
      updateTears();
    }

    function handleNo() {
      if (success) return;

      if (stage === 0) {
        stage = 1;
        crying = true;
        setMessage('Why no? Please think once more.');
        soundTextEl.textContent = 'sniff...';
      } else if (stage === 1) {
        stage = 2;
        crying = true;
        setMessage('Bubu I love u. Click yes, please.');
        soundTextEl.textContent = 'Boing! Nooo!';
        moveNoButton();
      } else {
        stage = 3;
        crying = true;
        setMessage('Please click yes, I am here waiting.');
        soundTextEl.textContent = 'Hop hop BOING!';
        moveNoButton();
      }

      updateHint();
      noBtn.classList.add('jump');
      setTimeout(() => noBtn.classList.remove('jump'), 400);
      updateTears();
    }

    yesBtn.addEventListener('click', handleYes);
    noBtn.addEventListener('click', handleNo);
    noBtn.addEventListener('mouseenter', () => {
      if (stage >= 2 && !success) moveNoButton();
    });
    noBtn.addEventListener('mousedown', () => {
      if (stage >= 2 && !success) moveNoButton();
    });

    updateTears();
    updateHint();
    requestAnimationFrame(tickLoop);
  </script>
</body>
</html>
